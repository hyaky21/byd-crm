<!DOCTYPE html>
<html lang="fr">

<head>

    <meta charset="UTF-8">

    <title>Modifier un Prospect - BYD CRM</title>

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

</head>

<body>

<div class="brand">

    <div class="brand-logos">

    <img src="{{ url_for('static', filename='byd-logo.png') }}" alt="BYD">

    <span class="logo-separator"></span>

    <img src="{{ url_for('static', filename='autonejma-logo.png') }}" alt="Auto Nejma">

</div>

<div class="dash-title">
    <h1>BYD CRM</h1>
    <p>Gestion des prospects</p>
</div>

</div>

<div class="card">

    <div class="card-header">

        <span>CRM BYD</span>

        <h2>Modifier le Prospect</h2>

    </div>

    <form method="POST">

        <div class="section-title">

            Période

        </div>

        <div class="grid-3">

            <div>

                

            </div>

            <div>

                

            </div>

            <div>

                <label>Date *</label>

                <input
    type="text"
    id="date_contact"
    name="date_contact"
    value="{{ prospect.date_contact.strftime('%Y-%m-%d') if prospect.date_contact else '' }}"
    required>

            </div>

        </div>

        <div class="section-title">

            Commercial

        </div>

        <label>Commercial *</label>

        <select name="commercial" required>

            {% for commercial in commerciaux %}

            <option value="{{ commercial.id }}"
            {% if prospect.commercial_id==commercial.id %}selected{% endif %}>

                {{ commercial.nom }}

            </option>

            {% endfor %}

        </select>

        <div class="section-title">

            Client

        </div>

        <div class="grid-2">

            <div>

                <label>Nom *</label>

                <input
                    type="text"
                    name="nom_client"
                    value="{{ prospect.nom_client }}"
                    required>

            </div>

            <div>

                <label>Prénom *</label>

                <input
                    type="text"
                    name="prenom_client"
                    value="{{ prospect.prenom_client }}"
                    required>

            </div>

        </div>

        <div class="grid-2">

            <div>

                <label>Téléphone *</label>

                <input
                    type="text"
                    name="telephone"
                    value="{{ prospect.telephone }}"
                    required>

            </div>

            <div>

                <label>Email</label>

                <input
                    type="email"
                    name="email"
                    value="{{ prospect.email or '' }}">

            </div>

        </div>

        <label>Ville</label>

        <input
            type="text"
            name="ville"
            value="{{ prospect.ville or '' }}">
                    <div class="section-title">

            Véhicule

        </div>

        <label>Potentiel *</label>

        <select name="potentiel" required>

            {% for potentiel in potentiels %}

            <option value="{{ potentiel.id }}"
            {% if prospect.potentiel_id==potentiel.id %}selected{% endif %}>

                {{ potentiel.nom }}

            </option>

            {% endfor %}

        </select>

        <label>Modèle *</label>

        <select name="modele" required>

            {% for modele in modeles %}

            <option value="{{ modele.id }}"
            {% if prospect.modele_id==modele.id %}selected{% endif %}>

                {{ modele.nom }}

            </option>

            {% endfor %}

        </select>

        <label>Version *</label>

        <select name="version" required>

            {% for version in versions %}

            <option value="{{ version.id }}"
            {% if prospect.version_id==version.id %}selected{% endif %}>

                {{ version.nom }}

            </option>

            {% endfor %}

        </select>

        <label>Couleur extérieure</label>

        <select name="couleur">

            <option value="">Sélectionner</option>

            {% for couleur in couleurs %}

            <option value="{{ couleur.id }}"
            {% if prospect.couleur_id==couleur.id %}selected{% endif %}>

                {{ couleur.nom }}

            </option>

            {% endfor %}

        </select>

        <label>Intérieur</label>

        <select name="interieur">

            <option value="">Sélectionner</option>

            {% for interieur in interieurs %}

            <option value="{{ interieur.id }}"
            {% if prospect.interieur_id==interieur.id %}selected{% endif %}>

                {{ interieur.nom }}

            </option>

            {% endfor %}

        </select>

        <label>Motorisation</label>

        <select name="motorisation">

            <option value="">Sélectionner</option>

            {% for motorisation in motorisations %}

            <option value="{{ motorisation.id }}"
            {% if prospect.motorisation_id==motorisation.id %}selected{% endif %}>

                {{ motorisation.nom }}

            </option>

            {% endfor %}

        </select>

        <div class="section-title">

            Financement

        </div>

        <label>Type de financement</label>

        <select name="financement">

            <option value="">Sélectionner</option>

            {% for financement in financements %}

            <option value="{{ financement.id }}"
            {% if prospect.financement_id==financement.id %}selected{% endif %}>

                {{ financement.nom }}

            </option>

            {% endfor %}

        </select>

        <div class="section-title">

            Canal

        </div>

        <label>Canal</label>

        <select name="canal">

            <option value="">Sélectionner</option>

            {% for canal in canaux %}

            <option value="{{ canal.id }}"
            {% if prospect.canal_id==canal.id %}selected{% endif %}>

                {{ canal.nom }}

            </option>

            {% endfor %}

        </select>

        <label>Détail Canal</label>

        <select name="detail_canal">

            <option value="">Sélectionner</option>

            {% for detail in details %}

            <option value="{{ detail.id }}"
            {% if prospect.detail_canal_id==detail.id %}selected{% endif %}>

                {{ detail.nom }}

            </option>

            {% endfor %}

        </select>
                <div class="section-title">

            Observation

        </div>

        <label>Commentaire</label>

        <textarea
            name="commentaire"
            rows="5"
            placeholder="Saisir les remarques concernant le prospect...">{{ prospect.commentaire or '' }}</textarea>

        <div style="display:flex;gap:15px;margin-top:25px;">

            <button type="submit">

                Enregistrer les modifications

            </button>

            <a href="{{ url_for('dashboard') }}"
               class="main-link">

                Retour au Dashboard

            </a>

        </div>

    </form>

</div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/fr.js"></script>

<script>

flatpickr("#date_contact",{

    dateFormat:"Y-m-d",

    altInput:true,

    altFormat:"d/m/Y",

    locale:"fr",

    allowInput:true

});

</script>

</body>

</html>
